services:
  - type: web
    name: cv-matcher
    runtime: docker
    plan: free
    dockerCommand: /app/start.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "3000"
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-sonnet-4-6
      - key: LLM_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_LLM
        value: WARNING
      - key: FRONTEND_BASE_URL
        value: https://cv-matcher.onrender.com
